image: mcr.microsoft.com/playwright:v1.51.0-noble  # base Docker image

stages:
  - test

variables:
  BASE_URL: $BASE_URL  # GitLab CI/CD variables
  CI: "true"
  

test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"  # manual trigger
  script:
    - npm ci
    - npx bddgen
    - npx playwright test --project=setup
    - npx playwright test --project=bdd-chromium --project=bdd-chromium-no-auth
  artifacts:
    when: always
    paths:
      - playwright-report/
    expire_in: 30 days